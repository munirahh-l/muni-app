<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Muni"/>
<meta name="theme-color" content="#f8f6f3"/>
<title>Muni — Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f6f3;--surface:#fff;--border:#e8e2da;--border2:#f0ebe3;
  --ink:#1a1614;--mid:#8a7e74;--muted:#b8afa6;
  --blood:#590707;--rose:#c4785a;--cream:#f2f2ea;
  --sage:#7a9a7e;--gold:#c9a96e;--info:#7a9aaa;--blush:#e8c4b0;
  --df:'Cormorant Garamond',serif;--dm:'DM Mono',monospace;
}
body{background:var(--bg);color:var(--ink);font-family:var(--dm);font-size:12px;min-height:100vh;-webkit-tap-highlight-color:transparent}
input,select,textarea,button{font-family:var(--dm);font-size:12px;-webkit-appearance:none}
button{cursor:pointer}
a{text-decoration:none}

/* LAYOUT */
.app{display:grid;grid-template-columns:192px 1fr;grid-template-rows:52px 1fr;min-height:100vh}

/* TOPBAR */
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100}
.tb-brand{font-family:var(--df);font-style:italic;font-size:18px;letter-spacing:.04em;color:var(--ink)}
.tb-greet{font-family:var(--df);font-style:italic;font-size:13px;color:var(--mid)}
.tb-date{font-size:9px;color:var(--muted);letter-spacing:.14em;text-align:right}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);
  position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;padding:10px 0}
.nav-group{font-size:8px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);padding:12px 16px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;
  font-size:11px;color:var(--mid);border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--bg);color:var(--ink);border-left-color:var(--blood)}

/* MAIN */
.main{padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.panel{display:none;flex-direction:column;gap:14px}
.panel.active{display:flex}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);padding:16px}
.ctitle{font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* STAT GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
.gc{background:var(--surface);padding:14px}
.gc-label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.gc-val{font-family:var(--df);font-size:24px;color:var(--ink);line-height:1}
.gc-sub{font-size:9px;color:var(--muted);margin-top:3px}
.gc-inp{font-family:var(--df);font-size:22px;color:var(--ink);border:none;border-bottom:1px dashed var(--border);
  outline:none;background:transparent;width:100%;padding:2px 0}

/* INPUTS */
.inp{width:100%;border:1px solid var(--border);padding:8px 10px;background:var(--bg);color:var(--ink);outline:none}
.inp:focus{border-color:var(--blood)}
.inp-bare{border:none;border-bottom:1px solid var(--border2);padding:5px 0;background:transparent;
  color:var(--ink);outline:none;width:100%}
.inp-bare:focus{border-bottom-color:var(--blood)}
.sel{border:1px solid var(--border);padding:8px 10px;background:var(--bg);color:var(--mid);outline:none;cursor:pointer}
.btn-p{padding:8px 14px;background:var(--blood);color:#fff;border:none;font-family:var(--dm);
  font-size:10px;letter-spacing:.12em;transition:opacity .15s}
.btn-p:hover{opacity:.85}
.btn-g{padding:8px 14px;background:transparent;border:1px solid var(--border);color:var(--mid);
  font-family:var(--dm);font-size:10px;letter-spacing:.12em;transition:all .15s}
.btn-g:hover{border-color:var(--blood);color:var(--blood)}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.textarea{width:100%;border:none;outline:none;resize:none;background:transparent;
  font-family:var(--df);font-style:italic;font-size:15px;color:var(--ink);line-height:1.7}
.textarea::placeholder{color:var(--muted)}
.focus-inp{width:100%;border:none;border-bottom:1px solid var(--border);outline:none;padding:5px 0;
  font-family:var(--df);font-style:italic;font-size:17px;background:transparent;color:var(--ink)}
.focus-inp::placeholder{color:var(--muted)}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;font-size:8px;letter-spacing:.1em;border-radius:2px}
.b-brand{background:rgba(89,7,7,.08);color:var(--blood)}
.b-personal{background:rgba(184,155,170,.15);color:#b89baa}
.b-career{background:rgba(201,169,110,.15);color:var(--gold)}
.b-finance{background:rgba(122,154,170,.15);color:var(--info)}
.b-urgent{background:rgba(196,120,90,.12);color:var(--rose)}
.b-supplier{background:rgba(201,169,110,.15);color:var(--gold)}
.b-press{background:rgba(122,154,170,.15);color:var(--info)}
.b-faith{background:rgba(122,170,138,.12);color:var(--sage)}
.b-glow{background:rgba(184,155,170,.15);color:#b89baa}
.b-wealth{background:rgba(201,169,110,.15);color:var(--gold)}

/* LIST ROWS */
.lrow{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);
  margin-bottom:2px;cursor:pointer;transition:background .15s}
.lrow:hover{background:var(--cream)}
.lrow.done .ltext{text-decoration:line-through;opacity:.4}
.lcheck{width:13px;height:13px;border:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s}
.lcheck.on{background:var(--sage);border-color:var(--sage);color:#fff}
.lcheck.red{background:var(--blood);border-color:var(--blood);color:#fff}
.ltext{flex:1;font-size:11px;color:var(--ink)}
.ldel{font-size:15px;color:var(--muted);padding:0 4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.lrow:hover .ldel{opacity:1}

/* PROGRESS */
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:6px 0}
.pfill{height:100%;border-radius:2px;transition:width .8s ease}
.pfill.red{background:var(--blood)}
.pfill.sage{background:var(--sage)}
.pfill.gold{background:var(--gold)}
.pfill.rose{background:var(--rose)}
.pfill.rainbow{background:linear-gradient(90deg,var(--blood),var(--rose),var(--gold))}

/* LIFE BAR */
.lifebar{height:2px;background:var(--border);grid-column:1/-1;overflow:hidden}
.lifefill{height:100%;background:linear-gradient(90deg,var(--blood),var(--rose),var(--gold));transition:width 1s}

/* TIMELINE */
.tlrow{display:grid;grid-template-columns:100px 20px 1fr;cursor:pointer}
.tlrow:hover .tlcontent{background:var(--cream)}
.tldate{padding:13px 8px 13px 0;font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);text-align:right;padding-top:15px}
.tlspine{display:flex;flex-direction:column;align-items:center}
.tldot{width:8px;height:8px;border-radius:50%;border:1px solid var(--muted);margin-top:15px;
  flex-shrink:0;transition:all .2s}
.tldot.done{background:var(--blood);border-color:var(--blood)}
.tlline{width:1px;flex:1;background:var(--border2)}
.tlcontent{padding:10px 0 10px 12px;transition:background .15s}
.tltitle{font-family:var(--df);font-size:17px;color:var(--ink)}
.tltitle.done{text-decoration:line-through;opacity:.45}
.tldesc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.5}

/* DEBT */
.debt-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border2)}
.debt-row:last-child{border-bottom:none}
.dname{flex:1;font-size:11px}
.dbar{width:70px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.dbarf{height:100%;border-radius:2px;background:var(--blood)}
.damt{font-family:var(--df);font-size:16px;color:var(--blood)}
.dnote{font-size:9px;color:var(--muted);flex:1}

/* NOTES */
.notes-wrap{display:grid;grid-template-columns:190px 1fr;background:var(--border);gap:1px;min-height:400px}
.notes-list{background:var(--surface);overflow-y:auto}
.note-item{padding:10px 14px;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .15s}
.note-item:hover,.note-item.active{background:var(--bg)}
.note-item.active{border-left:2px solid var(--blood)}
.note-ititle{font-size:11px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-idate{font-size:9px;color:var(--muted);margin-top:2px}
.notes-editor{background:var(--surface);padding:16px;display:flex;flex-direction:column;gap:10px}

/* SOCIAL */
.scard{background:var(--bg);border:1px solid var(--border);padding:14px;transition:border-color .15s}
.scard:hover{border-color:var(--blood)}
.sc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sc-name{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
.sc-num{font-family:var(--df);font-size:20px;color:var(--ink);border:none;
  border-bottom:1px dashed var(--border);outline:none;background:transparent;width:80px}
.sc-stat-label{font-size:8px;color:var(--muted);letter-spacing:.1em;margin-top:1px}
.sc-link{display:inline-block;padding:6px 12px;border:1px solid var(--border);font-size:9px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--mid);transition:all .15s}
.sc-link:hover{border-color:var(--blood);color:var(--blood)}

/* AVATAR */
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blood);color:#fff;
  display:flex;align-items:center;justify-content:center;font-family:var(--df);font-size:13px;flex-shrink:0}

/* MOBILE */
.mob-nav{display:none}

/* FILTERS */
.fchip{padding:3px 10px;font-size:8px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .15s;margin:0 3px 4px 0}
.fchip.active,.fchip:hover{border-color:var(--blood);color:var(--blood)}

/* YEAR BADGE */
.ybadge{font-family:var(--df);font-style:italic;font-size:20px;color:var(--blood);
  margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}

@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:52px 1fr 56px}
  .sidebar{display:none}
  .main{padding:12px;padding-bottom:68px}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
  .notes-wrap{grid-template-columns:1fr}
  .tb-date{display:none}
  .mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:var(--surface);border-top:1px solid var(--border);height:56px;
    padding-bottom:env(safe-area-inset-bottom,0px)}
  .mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;cursor:pointer;color:var(--muted);font-size:8px;letter-spacing:.08em;transition:color .15s}
  .mob-tab.active{color:var(--blood)}
  .mob-icon{font-size:17px}
  .lifebar{display:none}
}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <span class="tb-brand">Muni</span>
  <span class="tb-greet" id="greet"></span>
  <span class="tb-date" id="dstr"></span>
</div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar"></nav>

<!-- MAIN -->
<div class="main" id="main">
  <div class="panel active" id="p-home"></div>
  <div class="panel" id="p-todo"></div>
  <div class="panel" id="p-notes"></div>
  <div class="panel" id="p-business"></div>
  <div class="panel" id="p-plan"></div>
  <div class="panel" id="p-finance"></div>
  <div class="panel" id="p-social"></div>
  <div class="panel" id="p-contacts"></div>
</div>

<!-- MOBILE NAV -->
<div class="mob-nav" id="mobNav"></div>
</div>

<script>
// ── STORAGE ──
const S={
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
}

// ── INITIAL DATA ──
const DEF_TODOS=[
  {id:1,text:'Define MulliWen hero silhouette',cat:'brand',done:false},
  {id:2,text:'Contact 3 manufacturers (UK + Lagos)',cat:'brand',done:false},
  {id:3,text:'Upgrade mulliwen.com to Shopify',cat:'brand',done:false},
  {id:4,text:'Register as sole trader HMRC',cat:'brand',done:false},
  {id:5,text:'Apply for £55k+ role',cat:'career',done:false},
  {id:6,text:'Open business bank account',cat:'brand',done:false},
]
const DEF_GOALS=[
  {id:1,text:'Daily Quran & Salah on time',year:'2026',pillar:'faith',done:false},
  {id:2,text:'MulliWen first sale',year:'2026',pillar:'brand',done:false},
  {id:3,text:'New role — £55k+',year:'2026',pillar:'career',done:false},
  {id:4,text:'Surgery completed & recovered',year:'2026',pillar:'glow',done:false},
  {id:5,text:'All personal debts cleared',year:'2026',pillar:'wealth',done:false},
  {id:6,text:'Email list hits 500',year:'2026',pillar:'brand',done:false},
  {id:7,text:'Umrah with family',year:'2027',pillar:'faith',done:false},
  {id:8,text:'MulliWen £20k revenue',year:'2027',pillar:'brand',done:false},
  {id:9,text:'£10k savings milestone',year:'2027',pillar:'wealth',done:false},
  {id:10,text:'MulliWen full-time',year:'2030',pillar:'brand',done:false},
  {id:11,text:'£500k MulliWen gross',year:'2031',pillar:'brand',done:false},
]
const DEF_CONTACTS=[
  {id:1,name:'Lagos Manufacturer',role:'Production partner',type:'supplier',wa:''},
  {id:2,name:'Fashion Bomb Daily',role:'Press / Media',type:'press',wa:''},
  {id:3,name:'Fresh Face Clinic',role:'Skin',type:'personal',wa:''},
]
const DEF_MILESTONES=[
  {id:1,date:'Q1 2026',title:'Hero silhouette locked',desc:'One or two pieces. Everything built from here.',year:'2026',done:false},
  {id:2,date:'Q2 2026',title:'First sample received',desc:'Quality approved. COGS confirmed.',year:'2026',done:false},
  {id:3,date:'Q2 2026',title:'Email list hits 500',desc:'Warm audience ready for launch.',year:'2026',done:false},
  {id:4,date:'Q3 2026',title:'mulliwen.com launches',desc:'Full Shopify store — not just landing page.',year:'2026',done:false},
  {id:5,date:'Q3 2026',title:'First pre-order opens',desc:'15+ pre-orders = produce. Under 10 = pause.',year:'2026',done:false},
  {id:6,date:'Q3 2026',title:'First sale ✓',desc:'Real money. Real customer.',year:'2026',done:false},
  {id:7,date:'Q4 2026',title:'First £1,000 month',desc:'Brand works. Reinvest everything.',year:'2026',done:false},
  {id:8,date:'Q4 2026',title:'Personal debts cleared',desc:'SURU, MacBook, Mum — all gone.',year:'2026',done:false},
  {id:9,date:'Q1 2027',title:'SS27 drop launches',desc:'Second collection. Brand has rhythm.',year:'2027',done:false},
  {id:10,date:'Q2 2027',title:'Email list hits 1,000',desc:'Most valuable business asset.',year:'2027',done:false},
  {id:11,date:'Q4 2027',title:'First £3,000 month',desc:'Real business. Reinvest 70%.',year:'2027',done:false},
  {id:12,date:'2028',title:'First press feature',desc:'Fashion Bomb Daily, Raydar, or Brick The Mag.',year:'2028',done:false},
  {id:13,date:'2028',title:'First wholesale order',desc:'A boutique buys at cost.',year:'2028',done:false},
  {id:14,date:'2029',title:'MulliWen £80–120k gross',desc:'Scaling decisions begin.',year:'2029',done:false},
  {id:15,date:'2030',title:'Full-time MulliWen',desc:'The brand funds your life.',year:'2030',done:false},
  {id:16,date:'2031',title:'£500k gross ✓',desc:'Built correctly. No shortcuts.',year:'2031',done:false},
]
const PHASE1_TASKS=[
  'Define hero silhouette (1–2 pieces)',
  'Contact 3 manufacturers (1 UK + 2 Lagos)',
  'Request first samples — budget £600–900',
  'Upgrade mulliwen.com to Shopify',
  'Brand photography shoot booked',
  'Grow email list to 500 subscribers',
  'Register as sole trader with HMRC',
  'Open business bank account (Monzo/Tide)',
  'Set up Klaviyo welcome email flow',
  'Packaging sourced & costed',
  'Tech packs finalised with specs',
  'Pre-order campaign planned',
]
const PILLAR_COLOR={faith:'#7a9a7e',brand:'#590707',career:'#c9a96e',glow:'#b89baa',wealth:'#7a9aaa',
  personal:'#b89baa',supplier:'#c9a96e',press:'#7a9aaa',finance:'#7a9aaa',urgent:'#c4785a'}

// ── STATE ──
let todos=S.get('todos',DEF_TODOS)
let goals=S.get('goals',DEF_GOALS)
let contacts=S.get('contacts',DEF_CONTACTS)
let notes=S.get('notes',[])
let milestones=S.get('milestones',DEF_MILESTONES)
let metrics=S.get('metrics',{revenue:'',email:'',units:'',orders:'',savings:''})
let brandChecks=S.get('brandChecks',{})
let socialVals=S.get('socialVals',{})
let debtVals=S.get('debtVals',{})
let contentIdeas=S.get('contentIdeas','')
let focus=S.get('focus','')
let quickNote=S.get('quickNote','')
let activeNote=null
let todoFilter='all'
let goalYearFilter='all'
let contactSearch=''
let noteTitle='',noteBody=''

// ── NAV CONFIG ──
const NAV=[
  {id:'home',label:'Home',icon:'⌂',group:'Overview'},
  {id:'todo',label:'To-Do & Goals',icon:'◻',group:'Daily'},
  {id:'notes',label:'Notes',icon:'◇',group:'Daily'},
  {id:'business',label:'MulliWen',icon:'◈',group:'Brand'},
  {id:'plan',label:'5-Year Plan',icon:'◎',group:'Brand'},
  {id:'finance',label:'Money',icon:'£',group:'Finance'},
  {id:'social',label:'Social',icon:'⊕',group:'Connect'},
  {id:'contacts',label:'Contacts',icon:'◻',group:'Connect'},
]
const MOB_TABS=[
  {id:'home',label:'Home',icon:'⌂'},
  {id:'todo',label:'Tasks',icon:'◻'},
  {id:'business',label:'Muni',icon:'◈'},
  {id:'finance',label:'£',icon:'£'},
  {id:'social',label:'Social',icon:'⊕'},
]
let currentTab='home'

// ── HELPERS ──
const el=id=>document.getElementById(id)
const h=(tag,cls,html,attrs={})=>{
  const e=document.createElement(tag)
  if(cls)e.className=cls
  if(html!==undefined)e.innerHTML=html
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v))
  return e
}
const fmtDate=d=>{try{return new Date(d+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}catch{return d}}

// ── SAVE HELPERS ──
const saveTodos=()=>S.set('todos',todos)
const saveGoals=()=>S.set('goals',goals)
const saveContacts=()=>S.set('contacts',contacts)
const saveNotes=()=>S.set('notes',notes)
const saveMilestones=()=>S.set('milestones',milestones)
const saveMetrics=()=>S.set('metrics',metrics)

// ── NAV BUILD ──
function buildNav(){
  const sb=el('sidebar'),mb=el('mobNav')
  sb.innerHTML='';mb.innerHTML=''
  const groups=[...new Set(NAV.map(n=>n.group))]
  groups.forEach(g=>{
    const gl=h('div','nav-group',g)
    sb.appendChild(gl)
    NAV.filter(n=>n.group===g).forEach(n=>{
      const item=h('div',`nav-item${currentTab===n.id?' active':''}`,'')
      item.innerHTML=`<span style="width:16px;text-align:center">${n.icon}</span>${n.label}`
      item.onclick=()=>switchTab(n.id)
      sb.appendChild(item)
    })
  })
  MOB_TABS.forEach(t=>{
    const tab=h('div',`mob-tab${currentTab===t.id?' active':''}`,'')
    tab.innerHTML=`<span class="mob-icon">${t.icon}</span><span>${t.label}</span>`
    tab.onclick=()=>switchTab(t.id)
    mb.appendChild(tab)
  })
}

function switchTab(id){
  currentTab=id
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  el('p-'+id).classList.add('active')
  buildNav()
  renderPanel(id)
}

function renderPanel(id){
  const fns={home:renderHome,todo:renderTodo,notes:renderNotes,
    business:renderBusiness,plan:renderPlan,finance:renderFinance,
    social:renderSocial,contacts:renderContacts}
  if(fns[id])fns[id]()
}

// ── HOME ──
function renderHome(){
  const p=el('p-home')
  const doneG=goals.filter(g=>g.done).length
  const pct=goals.length?Math.round((doneG/goals.length)*100):0
  const openT=todos.filter(t=>!t.done)

  p.innerHTML=`
    <div class="lifebar"><div class="lifefill" style="width:${pct}%"></div></div>

function renderTodoList(){

  tl.innerHTML=''

  filtered.forEach(t=>{
    const r=h('div',`lrow${t.done?' done':''}`)
    r.innerHTML=`<div class="lcheck${t.done?' red':''}">${t.done?'✓':''}</div>
      <span class="ltext">${t.text}</span>
      <span class="badge b-${t.cat}">${t.cat}</span>
      <span class="ldel">×</span>`
    r.querySelector('.lcheck').onclick=()=>{t.done=!t.done;saveTodos();renderTodoList()}
    r.querySelector('.ldel').onclick=e=>{e.stopPropagation();todos=todos.filter(x=>x.id!==t.id);saveTodos();renderTodoList()}
    tl.appendChild(r)
  })

}

    const name=el('cName').value.trim()
    if(!name)return
    contacts.unshift({id:Date.now(),name,role:el('cRole').value.trim(),type:el('cType').value,wa:el('cWa').value.trim()})
    saveContacts();el('cName').value='';el('cRole').value='';el('cWa').value='';renderContactList()
  }
  el('cName').onkeydown=e=>{if(e.key==='Enter')el('cAddBtn').click()}
  el('cSearch').oninput=e=>{contactSearch=e.target.value;renderContactList()}
  renderContactList()
}

function renderContactList(){
  const cl=el('contactList')
  if(!cl)return
  cl.innerHTML=''
  const filtered=contactSearch
    ?contacts.filter(c=>c.name.toLowerCase().includes(contactSearch.toLowerCase())||c.role.toLowerCase().includes(contactSearch.toLowerCase()))
    :contacts
  if(!filtered.length){cl.innerHTML='<p style="font-size:11px;color:var(--muted)">No contacts yet.</p>';return}
  filtered.forEach(c=>{
    const r=h('div','lrow','')
    r.style.cursor='default'
    r.innerHTML=`<div class="avatar">${c.name[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-size:11px;color:var(--ink)">${c.name}</div>
        <div style="font-size:9px;color:var(--muted);margin-top:1px">${c.role}</div></div>
      <span class="badge b-${c.type}">${c.type}</span>
      ${c.wa?`<a href="https://wa.me/${c.wa.replace(/\D/g,'')}" target="_blank" style="font-size:16px">💬</a>`:''}
      <span class="ldel" style="opacity:1">×</span>`
    r.querySelector('.ldel').onclick=()=>{contacts=contacts.filter(x=>x.id!==c.id);saveContacts();renderContactList()}
    cl.appendChild(r)
  })
}

// ── INIT ──
function init(){
  // Greeting
  const h2=new Date().getHours()
  el('greet').textContent=(h2<12?'Good morning':h2<17?'Good afternoon':'Good evening')+', Muni ✦'
  el('dstr').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})
  buildNav()
  renderHome()
}

init()
</script>
</body>
</html>
